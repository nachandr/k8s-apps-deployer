---
- name: Check redis pod status
  k8s_info:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - name={{ app_name }}
    field_selectors:
      - status.phase=Running
  register: pod
  until: >-
    pod.resources|default([])|length > 0 and
    pod | json_query('resources[*].status.containerStatuses[*].ready') | flatten |difference( [true] ) | length  == 0
  retries: 60
  delay: 10

- name: Get pod name
  set_fact:
    pod_name: "{{ (pod.resources|first).metadata.name }}"

- name: Retrieve and validate inserted data (kubernetes.core.k8s_exec)
  kubernetes.core.k8s_exec:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    namespace: "{{ namespace }}"
    pod: "{{ pod_name }}"
    container: "{{ app_name }}"
    command: redis-cli -a '{{ redis_password }}' get mytestkey
  register: output
  until: output.rc == 0 and output.stdout | default('') | length > 0
  delay: 10
  retries: 12

- name: Debug — redis GET mytestkey
  ansible.builtin.debug:
    msg:
      rc: "{{ output.rc }}"
      stdout: "{{ output.stdout | default('') }}"
      stderr: "{{ output.stderr | default('') }}"

- name: Fail if inserted data not present
  fail:
    msg: "Inserted data not present (expected 'Hello world' in stdout)"
  when: not (output.stdout is search("Hello world"))
